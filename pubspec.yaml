name: kailibrate
description: Kalibriere deine Wahrscheinlichkeitsschätzungen.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  go_router: ^14.6.2
  file_picker: ^8.1.4
  yaml: ^3.1.2
  fl_chart: ^0.69.0
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0
  device_info_plus: ^12.3.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_data/
