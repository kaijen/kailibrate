site_name: Kailibrate
site_description: Kalibriere deine Wahrscheinlichkeitsschätzungen
site_url: https://kaijen.github.io/kailibrate/
repo_url: https://github.com/kaijen/kailibrate
repo_name: kaijen/kailibrate

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

extra:
  version:
    provider: mike

plugins:
  - search:
      lang: de

nav:
  - Übersicht: index.md
  - Erste Schritte: erste-schritte.md
  - Konzepte: konzepte.md
  - Vorhersagen:
    - Workflow: vorhersagen/index.md
    - Typen: vorhersagen/typen.md
    - Detail-Ansicht: vorhersagen/detail-ansicht.md
  - KI-Generator: ki-generator.md
  - Import & Export:
    - Übersicht: import-export/index.md
    - Format-Referenz: import-export/format.md
    - Beispiele: import-export/beispiele.md
    - Manuell mit LLM: import-export/llm-prompts.md
  - Statistiken: statistiken.md
  - Changelog: changelog.md
  - Über Mich: ueber-mich.md
