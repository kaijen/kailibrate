name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Abhängigkeiten installieren
        run: flutter pub get

      - name: Code generieren (Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Keystore bereitstellen
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 --decode \
            > android/app/callibrate-release.jks

      - name: Release-APK bauen
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PATH: callibrate-release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release --build-name="${{ github.ref_name }}" --build-number="${{ github.run_number }}"

      - name: APK umbenennen
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/callibrate-${{ github.ref_name }}.apk

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: Callibrate ${{ github.ref_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/callibrate-${{ github.ref_name }}.apk
